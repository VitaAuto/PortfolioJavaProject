name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: portfolio_user
          POSTGRES_PASSWORD: portfolio_password
          POSTGRES_DB: portfolio_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Build API jar
        run: ./gradlew clean :api:build
      - name: Start API and dependencies
        run: |
          docker compose up -d
          for i in {1..30}; do
            if docker exec portfolio_postgres pg_isready -U portfolio_user; then
              echo "Postgres is up!"
              break
            fi
            echo "Waiting for Postgres to be ready..."
            sleep 2
          done
          for i in {1..30}; do
            if curl -s http://localhost:8082/actuator/health | grep '"status":"UP"' > /dev/null; then
              echo "API is up!"
              break
            fi
            echo "Waiting for API to be ready..."
            sleep 2
          done
          docker compose ps
      - name: Run smoke tests
        run: ./gradlew :tests:smokeTest
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke
          path: tests/allure-results/

  allure-report:
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-smoke
          path: tests/allure-results/
      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev
      - name: Generate Allure report
        run: allure generate tests/allure-results --clean -o public
      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: public/

  deploy:
    needs: allure-report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Download Allure report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: public/
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public