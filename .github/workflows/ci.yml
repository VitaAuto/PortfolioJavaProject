name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  up:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: portfolio_user
          POSTGRES_PASSWORD: portfolio_password
          POSTGRES_DB: portfolio_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Build API jar
        run: ./gradlew clean :api:build
      - name: Start API and dependencies
        run: |
          docker compose up -d
          for i in {1..30}; do
            if docker exec portfolio_postgres pg_isready -U portfolio_user; then
              echo "Postgres is up!"
              break
            fi
            echo "Waiting for Postgres to be ready..."
            sleep 2
          done
          for i in {1..30}; do
            if curl -s http://localhost:8082/actuator/health | grep '"status":"UP"' > /dev/null; then
              echo "API is up!"
              break
            fi
            echo "Waiting for API to be ready..."
            sleep 2
          done
          docker compose ps

  test:
    needs: up
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Run all tests
        run: ./gradlew :tests:test
      - name: Upload Allure results
        uses: actions/upload-artifact@v3
        with:
          name: allure-results
          path: tests/allure-results/

  smoke-test:
    needs: up
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Run smoke tests
        run: ./gradlew :tests:smokeTest
      - name: Upload Allure results
        uses: actions/upload-artifact@v3
        with:
          name: allure-results-smoke
          path: tests/allure-results/

  allure-report:
    needs: [test, smoke-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Download Allure results
        uses: actions/download-artifact@v3
        with:
          name: allure-results
          path: tests/allure-results/
      - name: Generate Allure report
        run: |
          docker run -v ${{ github.workspace }}/tests/allure-results:/allure-results -v ${{ github.workspace }}/public:/public registry.gitlab.com/qameta/allure/allure:2.27.0 generate /allure-results --clean -o /public
      - name: Upload Allure report
        uses: actions/upload-artifact@v3
        with:
          name: allure-report
          path: public/

  deploy:
    needs: allure-report
    runs-on: ubuntu-latest
    steps:
      - name: Download Allure report
        uses: actions/download-artifact@v3
        with:
          name: allure-report
          path: public/
      - name: Publish Allure report (manual step)
        run: echo "Allure report ready for publishing"